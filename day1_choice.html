<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진담중국어 - 알맞은 문장 고르기</title>
    <link rel="stylesheet" href="day1_choice_style.css" />
  </head>
  <body>
    <div id="game-container">
      <button class="back-btn" onclick="location.href = 'index.html'">
        ◀ 로비로
      </button>

      <div id="start-screen">
        <h2>알맞은 문장 고르기</h2>
        <p>한국어 뜻에 맞는 중국어 문장을<br />4개 중 하나 선택하세요!</p>
        <button id="start-btn" onclick="startGame()">학습 시작</button>
      </div>

      <div id="game-board" style="display: none">
        <div class="header">
          <div id="progress">진행도: 1 / 15</div>
          <div id="score">정답: 0</div>
        </div>

        <div class="question-box">
          <div id="ko-question">나는 듣는다</div>
        </div>

        <div id="feedback-msg"></div>

        <div class="choices-area">
          <button class="choice-btn" id="btn-0" onclick="selectAnswer(0)">
            <span class="cn-text" id="cn-text-0">我听</span>
            <span class="pinyin-text" id="pinyin-text-0">wǒ tīng</span>
          </button>
          <button class="choice-btn" id="btn-1" onclick="selectAnswer(1)">
            <span class="cn-text" id="cn-text-1">我喝</span>
            <span class="pinyin-text" id="pinyin-text-1">wǒ hē</span>
          </button>
          <button class="choice-btn" id="btn-2" onclick="selectAnswer(2)">
            <span class="cn-text" id="cn-text-2">他去</span>
            <span class="pinyin-text" id="pinyin-text-2">tā qù</span>
          </button>
          <button class="choice-btn" id="btn-3" onclick="selectAnswer(3)">
            <span class="cn-text" id="cn-text-3">你好</span>
            <span class="pinyin-text" id="pinyin-text-3">nǐ hǎo</span>
          </button>
        </div>
      </div>

      <div id="result-screen" style="display: none">
        <h2>학습 완료!</h2>
        <p id="final-score">총 15문제 중 0문제 정답</p>
        <button id="start-btn" onclick="location.reload()">
          다시 복습하기
        </button>
      </div>
    </div>

    <script src="day1_choice_script.js"></script>
  </body>
</html>
